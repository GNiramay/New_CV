# This is a basic workflow to help you get started with Actions
name: CI to build Resume PDF

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Fix #2: grant write access so git push works
permissions:
  contents: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Fix #3: restore cache BEFORE installing
      - name: Restore TeX Live cache
        id: cache-texlive
        uses: actions/cache@v4
        with:
          path: |
            /usr/share/texlive
            /usr/bin/lualatex
            /usr/bin/latexmk
            /usr/bin/luatex          
          key: texlive-${{ runner.os }}-v2

      # installing latex
      - name: Install LaTeX (TeX Live)
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            texlive-bibtex-extra \
            latexmk

      - name: Make compile script executable
        run: chmod +x Compile.sh

      - name: Create dummy folder
        run: mkdir -p Personal

      # Fix #1: add --interaction=nonstopmode; Fix #4: removed continue-on-error
      - name: Run compile script
        run: latexmk -lualatex -interaction=nonstopmode -halt-on-error resume.tex

      - name: Cleanup
        run: rm -f resume.aux resume.fdb_latexmk resume.fls resume.log resume.out

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: "*.pdf"

      # Fix #2: inject token into remote URL; add [skip ci] to prevent infinite loop
      - name: Commit PDF to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add *.pdf
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Auto-build resume PDF [skip ci]"
          git push
