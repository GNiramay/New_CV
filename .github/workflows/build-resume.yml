# This is a basic workflow to help you get started with Actions
name: CI to build Resume PDF

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - name: Checkout repo
      uses: actions/checkout@v4

    # installing latex
    - name: Install LaTeX (TeX Live)  
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          texlive-luatex \
          texlive-latex-extra \
          texlive-fonts-recommended \
          texlive-fonts-extra \
          texlive-science \
          latexmk

    - name: Make compile script executable
      run: chmod +x Compile.sh

    - name: Run compile script
      run: ./Compile.sh

    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: resume-pdf
        path: |
          *.pdf
            
    - name: Commit PDF to repo
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add *.pdf
        git commit -m "Auto-build resume PDF" || echo "No changes"
        git push

    - name: Cache TeX Live
      uses: actions/cache@v4
      with:
        path: /usr/share/texlive
        key: texlive-${{ runner.os }}
